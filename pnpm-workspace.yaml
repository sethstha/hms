packages:
  - "apps/*"
  - "packages/*"

onlyBuiltDependencies:
  - esbuild

catalog:
  # ESLint toolchain
  eslint: ^10.1.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-svelte: ^3.16.0
  globals: ^17.4.0
  "@eslint/compat": ^2.0.3
  "@eslint/js": ^10.0.1
  typescript-eslint: ^8.58.0

  # Prettier toolchain
  prettier: ^3.8.1
  prettier-plugin-svelte: ^3.5.1
  prettier-plugin-tailwindcss: ^0.7.2

  # Svelte / SvelteKit
  svelte: 5.54.0
  svelte-check: ^4.4.2
  "@sveltejs/kit": ^2.56.1
  "@sveltejs/adapter-cloudflare": ^5.0.0
  "@sveltejs/vite-plugin-svelte": ^7.0.0

  # Tailwind
  tailwindcss: ^4.2.2
  "@tailwindcss/vite": ^4.1.18

  # Build tools
  vite: ^8.0.3
  wrangler: ^4.80.0
  "@types/node": ^24

  # i18n
  "@inlang/paraglide-js": ^2.10.0

  # Hono
  hono: ^4.6.0

  # Validation
  zod: ^4.0.0

  # Database
  drizzle-orm: ^0.44.0

  # Auth
  better-auth: ^1.5.6

  # UI singletons (Svelte runtime libs — must share Svelte instance with consuming app)
  mode-watcher: ^1.1.0
  svelte-sonner: ^1.1.0
